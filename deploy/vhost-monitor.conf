# ─── Apache vhost include: reverse proxy /monitor → Node :3000 ───────────────
# Use isto SE o .htaccess não funcionar (alguns planos SiteGround bloqueiam
# [P] proxy via .htaccess). Coloque no vhost do sougni.com via root SSH:
#
#   /etc/apache2/sites-available/sougni.com.conf  (ou similar)
#
# Depois: sudo apachectl configtest && sudo systemctl reload apache2
# ─────────────────────────────────────────────────────────────────────────────

<IfModule mod_proxy.c>

  # Redireciona /monitor para /monitor/ (evita assets quebrados)
  RedirectMatch 301 ^/monitor$ /monitor/

  # Encaminha /monitor/* removendo o prefixo
  ProxyPass        "/monitor/" "http://127.0.0.1:3000/"
  ProxyPassReverse "/monitor/" "http://127.0.0.1:3000/"

  # Preserva host e propaga schema HTTPS para o Node
  ProxyPreserveHost On
  RequestHeader set X-Forwarded-Proto "https" env=HTTPS
  RequestHeader set X-Forwarded-Prefix "/monitor"

  # Timeout longo para SSE (Server-Sent Events)
  ProxyTimeout 3600

  # SSE precisa de streaming — desliga buffering
  <Location "/monitor/api/sse">
    ProxyPass        "http://127.0.0.1:3000/api/sse" disablereuse=on
    ProxyPassReverse "http://127.0.0.1:3000/api/sse"
    SetEnv proxy-nokeepalive 1
    SetEnv proxy-sendchunked 1
  </Location>

</IfModule>
